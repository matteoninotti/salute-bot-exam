{% extends "base.html" %}
{% block content %}
<h2>Aggiungi prestazione</h2>
<p class="muted">Utente: {{ cf }}</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="{{ url_for('add', cf=cf) }}">
  <label>NRE (numero ricetta, 15 caratteri)
    <input name="nre" maxlength="15" placeholder="020B45678900002" required>
  </label>
  <button type="submit">Invia richiesta</button>
</form>
<p><a href="{{ url_for('dashboard', cf=cf) }}">Torna alla dashboard</a></p>
{% endblock %}
