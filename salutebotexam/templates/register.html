{% extends "base.html" %}
{% block content %}
<h2>Registrazione</h2>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="{{ url_for('register') }}">
  <label>Codice Fiscale
    <input name="cf" maxlength="16" value="{{ cf or '' }}" required>
  </label>
  <label>NRE (numero ricetta, 15 caratteri)
    <input name="nre" maxlength="15" placeholder="010A31234500001" required>
  </label>
  <button type="submit">Invia richiesta</button>
</form>
<p><a href="{{ url_for('index') }}">Torna al login</a></p>
{% endblock %}
