name: checks

# Static checks + tests on every push / PR. Runs on ubuntu amd64 (the tested-and-
# run target, D12). No LocalStack/AWS here — that SES integration smoke is a
# separate Phase 5 job (D15); this workflow is lint + type-check + unit tests only.

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (lint)
        run: . .venv/bin/activate && ruff check salutebot tests

      - name: Mypy (types)
        run: . .venv/bin/activate && mypy

      - name: Pyright (types)
        run: . .venv/bin/activate && pyright

      - name: Pytest
        run: . .venv/bin/activate && pytest -q
